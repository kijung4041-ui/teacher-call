<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교무실 호출 수신함</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        h1 { font-size: 3rem; margin-bottom: 20px; }
        #startBtn { background-color: #e74c3c; color: white; border: none; padding: 20px 40px; font-size: 1.5rem; border-radius: 10px; cursor: pointer; margin-bottom: 30px; font-weight: bold; }
        #startBtn:hover { background-color: #c0392b; }
        #history { font-size: 2rem; color: #f1c40f; text-align: center; }
    </style>
</head>
<body>

    <h1>🎙️ 교무실 호출 수신 대기</h1>
    <button id="startBtn">수신 대기 시작 (필수 클릭)</button>
    <div id="history">현재 호출된 선생님이 없습니다.</div>

    <script>
        // 선생님께서 알려주신 파이어베이스 설정값입니다.
        const firebaseConfig = {
            apiKey: "AIzaSyCPpMKQYkrHmqrNf-ArbOgtIFhMUnR3NeM",
            authDomain: "teachercall-dfecd.firebaseapp.com",
            databaseURL: "https://teachercall-dfecd-default-rtdb.firebaseio.com",
            projectId: "teachercall-dfecd",
            storageBucket: "teachercall-dfecd.firebasestorage.app",
            messagingSenderId: "988213097074",
            appId: "1:988213097074:web:dc32c09a760d5e68f608eb"
        };

        // 파이어베이스 초기화
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isReady = false;
        let isFirstLoad = true;
        let synthesis = window.speechSynthesis;

        // 소리 자동재생 방지 해제 버튼
        document.getElementById('startBtn').addEventListener('click', function() {
            isReady = true;
            this.style.display = 'none';
            
            const initMsg = new SpeechSynthesisUtterance("네트워크 호출 시스템이 활성화되었습니다.");
            initMsg.lang = 'ko-KR';
            synthesis.speak(initMsg);
            
            document.getElementById('history').innerText = "수신 대기 중... 학생의 호출을 기다립니다.";
        });

        // 파이어베이스 실시간 감지
        db.ref('calls/latest').on('value', (snapshot) => {
            const data = snapshot.val();
            
            if (data) {
                // 새로고침 할 때 과거 기록으로 소리가 나는 것을 방지
                if (isFirstLoad) {
                    isFirstLoad = false;
                    return; 
                }

                const teacherName = data.teacherName;
                const timeString = new Date(data.timestamp).toLocaleTimeString();
                document.getElementById('history').innerText = `[${timeString}] ${teacherName} 선생님 호출됨!`;

                // 음성 송출
                if (isReady) {
                    const speechMsg = new SpeechSynthesisUtterance(`${teacherName} 선생님, 학생 왔습니다.`);
                    speechMsg.lang = 'ko-KR';
                    synthesis.speak(speechMsg);
                }
            }
        });
    </script>
</body>
</html>
